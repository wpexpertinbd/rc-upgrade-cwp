# /usr/local/cwpsrv/conf.d/webmail.conf  (CWP :2095 / :2096 webmail vhost)
# Corrected for Roundcube 1.7.x: docroot -> public_html, static.php PATH_INFO
# handling, and PHP routed to the dedicated php-fpm 8.3 socket.
# mail.<domain> / webmail.<domain> in the main nginx vhost proxy_pass here.
#
# Change vs CWP stock:
#   - root  ...../roundcube           ->  ...../roundcube/public_html
#   - location ~ \.php$               ->  location ~ \.php(/|$)   (matches static.php/<asset>)
#   - added fastcgi_param PATH_INFO $fastcgi_path_info
#   - removed `try_files $uri =404`   (it 404s static.php/<path> requests)
#   - fastcgi_pass cwpsvc.sock (php71) -> unix:/run/rc-php83.sock
#   - open_basedir drops the /usr/local/cwp/php71/lib path
# Keep your real ssl_certificate / ssl_certificate_key paths (CWP default shown).

server {
    listen       2095;
    server_name  localhost;

    location / {
        root   /usr/local/cwpsrv/var/services/roundcube/public_html;
        index  index.php;

        location ~ \.php(/|$) {
                fastcgi_split_path_info ^(.+?\.php)(/.*)$;
                fastcgi_read_timeout 600;
                fastcgi_pass    unix:/run/rc-php83.sock;
                fastcgi_index   index.php;
                fastcgi_param   SCRIPT_FILENAME  $document_root$fastcgi_script_name;
                fastcgi_param   SCRIPT_NAME       $fastcgi_script_name;
                fastcgi_param   PATH_INFO         $fastcgi_path_info;
                fastcgi_param   PHP_ADMIN_VALUE "open_basedir = /usr/local/cwpsrv/var/services/roundcube/:/tmp/";
                include                 fastcgi_params;
            }
    }
}

server {
    listen       2096 ssl;
    server_name  localhost;

    ssl_session_timeout  90m;
    ssl_certificate /etc/pki/tls/certs/hostname.bundle;
    ssl_certificate_key /etc/pki/tls/private/hostname.key;
    ssl_protocols       TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers   on;

    location / {
        root   /usr/local/cwpsrv/var/services/roundcube/public_html;
        index  index.php;

        location ~ \.php(/|$) {
                fastcgi_split_path_info ^(.+?\.php)(/.*)$;
                fastcgi_read_timeout 600;
                fastcgi_pass    unix:/run/rc-php83.sock;
                fastcgi_index   index.php;
                fastcgi_param   SCRIPT_FILENAME  $document_root$fastcgi_script_name;
                fastcgi_param   SCRIPT_NAME       $fastcgi_script_name;
                fastcgi_param   PATH_INFO         $fastcgi_path_info;
                fastcgi_param   PHP_ADMIN_VALUE "open_basedir = /usr/local/cwpsrv/var/services/roundcube/:/tmp/";
                include                 fastcgi_params;
            }
    }
}
