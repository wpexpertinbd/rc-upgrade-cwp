; Dedicated php-fpm 8.3 pool for Roundcube only.
; Drop in CWP alt-php pool dir, e.g. /opt/alt/php-fpm83/usr/etc/php-fpm.d/roundcube.conf
; then: systemctl restart php-fpm83   (creates /run/rc-php83.sock)
; This leaves the CWP panel + user panel on php71 untouched; only Roundcube
; (via the patched webmail nginx routes) uses this 8.3 pool.

[roundcube]
user = cwpsvc
group = cwpsvc
listen = /run/rc-php83.sock
listen.owner = root
listen.group = root
listen.mode = 0666
pm = ondemand
pm.max_children = 15
pm.process_idle_timeout = 30s
chdir = /
php_admin_value[open_basedir] = /usr/local/cwpsrv/var/services/roundcube/:/tmp/
php_admin_value[session.save_path] = /usr/local/cwpsrv/var/services/roundcube/temp
php_admin_value[upload_tmp_dir] = /usr/local/cwpsrv/var/services/roundcube/temp
php_admin_value[sys_temp_dir] = /usr/local/cwpsrv/var/services/roundcube/temp
php_admin_value[upload_max_filesize] = 64M
php_admin_value[post_max_size] = 72M
php_admin_value[memory_limit] = 256M
php_admin_value[date.timezone] = UTC
