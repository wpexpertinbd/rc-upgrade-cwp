# Replacement for the `location /roundcube { ... }` block inside
# /usr/local/cwpsrv/conf/cwp_services.conf  (the /roundcube subpath, port 2031;
# reached via cpanel.<domain>/roundcube and server.<domain>/roundcube).
#
# This is a SUBPATH app, so it uses `alias` (not root) and a hardcoded
# SCRIPT_FILENAME. Corrected for Roundcube 1.7.x:
#   - alias -> .../roundcube/public_html
#   - regex matches static.php/<asset> via optional (?<pathinfo>/.*)? and passes PATH_INFO
#   - fastcgi_pass -> dedicated php-fpm 8.3 socket
# Leave the sibling /pma and /phpPgAdmin blocks untouched (they stay on php71).

location /roundcube {
    alias /usr/local/cwpsrv/var/services/roundcube/public_html;
    index  index.php;

    location ~ ^/roundcube/(?<rcphp>.+\.php)(?<pathinfo>/.*)?$ {
        include                 fastcgi_params;
        fastcgi_read_timeout 600;
        fastcgi_pass    unix:/run/rc-php83.sock;
        fastcgi_index   index.php;
        fastcgi_param   SCRIPT_FILENAME  /usr/local/cwpsrv/var/services/roundcube/public_html/$rcphp;
        fastcgi_param   SCRIPT_NAME   /roundcube/$rcphp;
        fastcgi_param   PATH_INFO  $pathinfo;
        fastcgi_param   PHP_ADMIN_VALUE "open_basedir = /usr/local/cwpsrv/var/services/roundcube/:/tmp/";
    }
}
